name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  COMPACT_VERSION: "0.31.1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Compact toolchain
        id: compact-cache
        uses: actions/cache@v4
        with:
          path: ~/.compact
          key: compact-${{ env.COMPACT_VERSION }}-${{ runner.os }}

      - name: Install Compact toolchain
        if: steps.compact-cache.outputs.cache-hit != 'true'
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh

      - name: Pin Compact version
        run: |
          echo "$HOME/.compact/bin" >> "$GITHUB_PATH"
          "$HOME/.compact/bin/compact" update "$COMPACT_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Compile contract
        run: npm run compact --workspace=contract

      - name: Run tests
        run: npm test --workspace=contract

      - name: Build contract
        run: npm run build --workspace=contract

      - name: Build frontend
        run: npm run build --workspace=frontend
